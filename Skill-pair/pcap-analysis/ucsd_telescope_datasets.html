    "description": "The UCSD Network Telescope is a passive traffic monitoring system built on a globally routed, but lightly utilized \/9 and \/10 (originally a \/8) network. Under CAIDA\/UCSD stewardship, this unique resource provides valuable data for network security researchers.\n\n**Introduction**\n\nThe UCSD network telescope (aka a black hole, an Internet sink, darkspace, or a darknet) is a globally routed \/8 network (approximately 0.3% of all IPv4 Internet addresses) that carries almost no legitimate traffic because there are few provider-allocated IP addresses in this prefix. After discarding the legitimate traffic from the incoming packets, the remaining data represent a continuous view of anomalous unsolicited traffic, or Internet Background Radiation (IBR). IBR results from a wide range of events, such as backscatter from randomly spoofed source denial-of-service attacks, the automated spread of Internet worms and viruses, scanning of address space by attackers or malware looking for vulnerable targets, and various misconfigurations (e.g. mistyping an IP address). In recent years, traffic destined to darkspace has evolved to include longer-duration, low-intensity events intended to establish and maintain botnets.\n\nCAIDA personnel maintain and expand the telescope instrumentation, collects, curates, archives, and analyze the data, and enable data access for vetted security researchers. As a result, many [publications using datasets generated from the UCSD Network Telescope](https:\/\/catalog.caida.org\/search?query=types%3Dpaper%20links%3Dcollection%3Aucsd_telescope_datasets) were written .\n",
