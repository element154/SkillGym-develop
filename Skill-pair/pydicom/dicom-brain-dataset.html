    <script nonce="SkIC1JuDkqdehUjhUxg7eg==" type="application/ld+json">{"@context":"http://schema.org/","@type":"Dataset","name":"Normal Brain MRI Dataset","description":"# Brain MRI Dataset, Magnetic Resonance Dataset, Anomaly Classification &amp; Detection\n\n# The dataset is created on the basis of [Brain MRI Dataset](https://unidata.pro/datasets/brain-mri-image-dicom/?utm_source=kaggle-td&amp;utm_medium=referral&amp;utm_campaign=dicom-brain-dataset)\n\nThe dataset consists of .dcm files containing **MRI scans of the brain** of the person with a normal brain. The images are **labeled** by the doctors and accompanied by **report** in PDF-format. \n\nThe dataset includes 7 studies, made from the different angles which provide a comprehensive understanding of a normal brain structure and useful in training brain anomaly classification algorithms.\n\n### MRI study angles in the dataset\n![](https://www.googleapis.com/download/storage/v1/b/kaggle-user-content/o/inbox%2F12421376%2F575ee174090e11f28708337336931252%2FFrame%2082.png?generation=1708436526735837&amp;alt=media)\n\n# 💴 For Commercial Usage: Full version of the dataset includes 100,000 brain studies of people with different conditions, leave a request on **[our website](https://unidata.pro/datasets/brain-mri-image-dicom/?utm_source=kaggle-td&amp;utm_medium=referral&amp;utm_campaign=dicom-brain-dataset)** to buy the dataset\n\n### Types of diseases and conditions in the full dataset:\n- Cancer\n- Multiple sclerosis\n- Metastatic lesion\n- Arnold-Chiari malformation\n- Focal gliosis of the brain\n- **AND MANY OTHER CONDITIONS** \n\n![](https://www.googleapis.com/download/storage/v1/b/kaggle-user-content/o/inbox%2F12421376%2Fab15a54b699a7d9d43dce4473e70ce56%2F7.gif?generation=1708435711188765&amp;alt=media)\n\nThe dataset holds great value for researchers and medical professionals involved in oncology, radiology, and medical imaging. It can be used for a wide range of purposes, including developing and evaluating novel imaging techniques, training and validating machine learning algorithms for automated tumor detection and segmentation, analyzing tumor response to different treatments, and studying the relationship between imaging features and clinical outcomes.\n\n## OTHER MEDICAL BRAIN MRI DATASETS:\n- **[Brain MRI - Multiple Sclerosis Dataset](https://www.kaggle.com/datasets/trainingdatapro/multiple-sclerosis-dataset)**\n- **[Brain Tumor MRI Dataset](https://www.kaggle.com/datasets/trainingdatapro/brain-mri-dataset)**\n- **[Brain Anomaly Detection Dataset](https://www.kaggle.com/datasets/trainingdatapro/brain-anomaly-detection)**\n- **[Fazekas Detection - MRI Dataset](https://www.kaggle.com/datasets/trainingdatapro/fazekas-mri)**\n\n## 🧩 This is just an example of the data. Leave a request [here](https://unidata.pro/datasets/brain-mri-image-dicom/?utm_source=kaggle-td&amp;utm_medium=referral&amp;utm_campaign=dicom-brain-dataset) to learn more\n\n# Content\n\n### The dataset includes:\n- **ST000001**: includes subfolders with 7 studies. Each study includes MRI-scans in **.dcm and .jpg formats**,\n- **DICOMDIR**: includes information about the patient's condition and links to access files,\n- **Brain_MRI_4.pdf**: includes medical report, provided by the radiologist,\n- **.csv file**: includes id of the studies and the number of files\n\n### Medical reports include the following data:\n- Patient's **demographic information**, \n- **Description** of the case, \n- Preliminary **diagnosis**, \n- **Recommendations** on the further actions\n\n*All patients consented to the publication of data*\n\n# Medical data might be collected in accordance with your requirements.\n\n**🚀 You can learn more about our high-quality unique datasets [here](https://unidata.pro/datasets/brain-mri-image-dicom/?utm_source=kaggle-td&amp;utm_medium=referral&amp;utm_campaign=dicom-brain-dataset)**\n\n*keywords: tumors, cloud, testing, glioma, related, pytorch, directories, science, improve, directory, malignant, classify, accuracy, level, classified, cancerous, magnetic, neural, resonance, mri brain scan, brain tumor, brain cancer, oncology, neuroimaging, radiology, brain metastasis, glioblastoma, meningioma, pituitary tumor, medulloblastoma, astrocytoma, oligodendroglioma, ependymoma, neuro-oncology, brain lesion, brain metastasis detection, brain tumor classification, brain tumor segmentation, brain tumor diagnosis, brain tumor prognosis, brain tumor treatment, brain tumor surgery, brain tumor radiation therapy, brain tumor chemotherapy, brain tumor clinical trials, brain tumor research, brain tumor awareness, brain tumor support, brain tumor survivor, neurosurgery, neurologist, neuroradiology, neuro-oncologist, neuroscientist, medical imaging, cancer detection, cancer segmentation, tumor, computed tomography, head, skull, brain scan, eye sockets, sinuses, computer vision, deep learning*\n","url":"https://www.kaggle.com/trainingdatapro/dicom-brain-dataset","version":2,"keywords":["subject, health and fitness, health, health conditions, cancer","subject, health and fitness, health","subject, health and fitness, health, health conditions","task, image-classification","subject, health and fitness, health, medicine"],"license":{"@type":"CreativeWork","name":"Attribution-NonCommercial-NoDerivatives 4.0 International (CC BY-NC-ND 4.0)","url":"https://creativecommons.org/licenses/by-nc-nd/4.0/"},"identifier":["4469006"],"includedInDataCatalog":{"@type":"DataCatalog","name":"Kaggle","url":"https://www.kaggle.com"},"creator":{"@type":"Person","name":"Unique Data","url":"https://www.kaggle.com/trainingdatapro","image":"https://storage.googleapis.com/kaggle-avatars/thumbnails/12421376-kg.jpg?t=2025-08-29-06-47-57"},"distribution":[{"@type":"DataDownload","requiresSubscription":true,"encodingFormat":"zip","fileFormat":"zip","contentUrl":"https://www.kaggle.com/datasets/trainingdatapro/dicom-brain-dataset/download?datasetVersionNumber=2","contentSize":"76289803 bytes"}],"com
